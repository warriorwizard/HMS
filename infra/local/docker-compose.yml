name: tarini-v6-local

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tarini-postgres
    environment:
      POSTGRES_DB: tarini
      POSTGRES_USER: tarini
      POSTGRES_PASSWORD: tarini
    ports:
      - "5432:5432"
    volumes:
      - tarini_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tarini -d tarini"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tarini-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - tarini_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  tarini_postgres_data:
  tarini_redis_data:

